specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: American Greetings
providerId: american-greetings
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Greeting Cards
  - Gift Wrap
  - Celebration
  - Rate Limiting
description: >-
  American Greetings does not publish public API rate limits. Reconcile when public limits are published.
notes: >-
  American Greetings is a consumer-products company; it does not publish a public API developer portal with documented pricing or rate limits. Retail trading-partner EDI and Creatacard / SmashUps consumer products are sold direct rather than via a priced API. Reconcile if a public API is launched.
sources:
  - https://www.americangreetings.com
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Undocumented - bilateral agreement
    scope: contract
    metric: varies
    limit: 'see partner agreement; not publicly documented'
policies:
  - name: Documentation Status
    description: >-
      American Greetings does not publish public per-second or per-minute API rate
      limits. Throughput, concurrency, and burst behavior are governed by the
      relevant partner, supplier, or merchant agreement.
  - name: Backoff Strategy
    description: >-
      Where any HTTP API is exposed, clients should implement exponential
      backoff with jitter and honor any Retry-After header returned on 429
      or 503 responses.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
